name: Build Roundup

on:
  schedule:
    # GitHub cron is UTC-only and BEST-EFFORT: scheduled runs are frequently delayed
    # and SOMETIMES DROPPED ENTIRELY (especially under load). A handful of morning
    # attempts can therefore all be missed — which is exactly what kept happening.
    # Fix: fire every 20 minutes across the whole morning window (off the hour). The
    # builder is idempotent — once a matchday is published it records the fixtures in
    # roundup-state.json and every later run exits immediately (no AI call, no commit)
    # — so these frequent attempts are free no-ops. With ~27 chances spanning 9 hours,
    # a total miss is extremely unlikely, and the day publishes well before 7am UK.
    # 03:03–11:43 UTC = 04:03–12:43 UK (BST).
    - cron: "3,23,43 3-11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: roundup
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so a rebase before push is reliable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate the page
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit the new page
        run: |
          git config user.name  "roundup-bot"
          git config user.email "roundup-bot@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Roundup update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          # The remote may have advanced while we were working (manual edits or
          # another run). Rebase onto the latest main and retry, so a push race
          # can't fail the build.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push rejected; rebasing onto latest main (attempt $i)"
            git pull --rebase --autostash origin main || true
            sleep $((RANDOM % 5 + 3))
          done
          echo "push still failing after retries" >&2
          exit 1
