name: Build Roundup

# Runs at three off-peak times each morning (UTC). GitHub's free scheduler is
# best-effort and most likely to drop jobs set for the exact top of the hour,
# so we avoid :00 and add backups. generate.py skips a scheduled run if that
# day's edition is already published, so the backups won't double-post.
on:
  schedule:
    - cron: "41 6 * * *"
    - cron: "41 7 * * *"
    - cron: "41 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: roundup
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate the page
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit the new page
        run: |
          git config user.name "roundup-bot"
          git config user.email "roundup-bot@users.noreply.github.com"
          git add docs schedule.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Roundup update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
