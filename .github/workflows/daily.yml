name: Build Roundup

on:
  schedule:
    # Every 30 min across a focused early window (04:00–09:30 UTC = 05:00–10:30 UK/BST).
    # Dialled back from the old every-20-min/9-hour schedule: each run now WAITS for
    # fresh data within itself (generate.py's freshness gate) and the relay is kept warm
    # by keepwarm.yml, so far fewer attempts are needed. Fewer runs => far fewer commits,
    # which — together with the concurrency-locked Pages deploy (pages.yml) — keeps us
    # comfortably under GitHub Pages' hourly deploy limit so pushes reliably go live.
    - cron: "12,42 4-9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: roundup
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0          # full history so a rebase before push is reliable

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wake & sync the source relay (so scores are current before we read)
        continue-on-error: true
        run: |
          echo "Poking Tristan's relay to wake it + pull the latest FIFA scores..."
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "https://trm-fantasy.onrender.com/wc/sync" || echo 000)
            echo "  /wc/sync attempt $i -> HTTP $code"
            [ "$code" = "200" ] && break
            sleep 15
          done
          sleep 25   # let the relay ingest FIFA's data before build_squads/generate read it
          curl -s -o /dev/null --max-time 60 "https://trm-fantasy.onrender.com/wc" || true

      - name: Rebuild squads + prices from source (auto-picks-up transfers)
        run: python build_squads.py

      - name: Generate the page
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit the new page
        run: |
          git config user.name  "roundup-bot"
          git config user.email "roundup-bot@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Roundup update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          # The remote may have advanced while we were working (manual edits or
          # another run). Rebase onto the latest main and retry, so a push race
          # can't fail the build.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push rejected; rebasing onto latest main (attempt $i)"
            git pull --rebase --autostash origin main || true
            sleep $((RANDOM % 5 + 3))
          done
          echo "push still failing after retries" >&2
          exit 1
