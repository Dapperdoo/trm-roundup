name: Build Roundup

on:
  schedule:
    # GitHub delays/skips jobs at the top of the hour, so we avoid :00 and add
    # backups — if one is dropped, a later one still runs. (Times are UTC.)
    - cron: "41 6 * * *"
    - cron: "41 7 * * *"
    - cron: "41 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: roundup
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so a rebase before push is reliable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate the page
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit the new page
        run: |
          git config user.name  "roundup-bot"
          git config user.email "roundup-bot@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Roundup update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          # The remote may have advanced while we were working (manual edits or
          # another run). Rebase onto the latest main and retry, so a push race
          # can't fail the build.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push rejected; rebasing onto latest main (attempt $i)"
            git pull --rebase --autostash origin main || true
            sleep $((RANDOM % 5 + 3))
          done
          echo "push still failing after retries" >&2
          exit 1
