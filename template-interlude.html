<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Morning After — Interlude · {{DATE_LABEL}}</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#111722; --panel2:#0d131c; --line:#1e2937;
    --ink:#e8edf4; --mut:#8a98ab; --cyan:#22d3ee; --cyan-dim:#0e7490;
    --gold:#f5c451; --red:#f0556b; --green:#34d399;
    --magenta:#f472b6; --purple:#a855f7;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:"Georgia","Times New Roman",serif; line-height:1.7;}
  .wrap{max-width:1100px; margin:0 auto; padding:0 22px 60px;}
  header.mast{
    border-bottom:3px double var(--magenta); margin-bottom:6px; padding:38px 0 18px; text-align:center;
    position:relative; overflow:hidden;
    background:
      radial-gradient(120% 90% at 50% -20%, rgba(168,85,247,.28), transparent 60%),
      radial-gradient(90% 80% at 15% 0%, rgba(34,211,238,.18), transparent 55%),
      radial-gradient(90% 80% at 85% 0%, rgba(244,114,182,.20), transparent 55%);
  }
  .kicker{font-family:Arial,Helvetica,sans-serif; letter-spacing:.42em; text-transform:uppercase; font-size:11px; color:var(--magenta); margin-bottom:10px;}
  .subtitle{font-family:Arial,Helvetica,sans-serif; font-size:12px; color:var(--cyan); letter-spacing:.26em; text-transform:uppercase; margin-top:12px; opacity:.9;}
  h1.title{font-family:Arial,Helvetica,sans-serif; font-weight:900; letter-spacing:-.5px; font-size:clamp(34px,6vw,60px); margin:0; line-height:.98; text-shadow:0 0 28px rgba(244,114,182,.35), 0 0 60px rgba(168,85,247,.25);}
  h1.title span{background:linear-gradient(90deg,var(--cyan),var(--magenta)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .setcol{max-width:720px; margin:30px auto 0;}
  .standby{font-family:Arial,Helvetica,sans-serif; text-transform:uppercase; letter-spacing:.24em; font-size:11px; color:var(--magenta); text-align:center; margin-bottom:22px;}
  .set p{margin:0 0 20px; font-size:18px; color:#cdd6e2;}
  .set p.open{border-left:3px solid var(--cyan); padding:4px 0 4px 18px; font-size:19px; color:#e8edf4;}
  .set p.open b{color:#fff;}
  .set p.close{border-left:3px solid var(--magenta); padding:6px 0 6px 18px; color:#e8edf4;}
  .set b.name{color:#fff; font-weight:700;}
  .panel{background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; margin:30px auto 0; max-width:720px;}
  .panel h3{margin:0; font-family:Arial,Helvetica,sans-serif; font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--cyan); padding:14px 16px; border-bottom:1px solid var(--line); background:var(--panel2);}
  table{width:100%; border-collapse:collapse; font-family:Arial,Helvetica,sans-serif;}
  td{padding:9px 14px; font-size:13px; border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .pos{color:var(--mut); width:26px; font-weight:700;}
  .tname{color:var(--ink); font-weight:600;}
  .mgr{color:var(--mut); font-weight:400; font-size:11px; margin-left:8px;}
  .tot{text-align:right; font-weight:900; color:var(--cyan);}
  tr.r1 .pos{color:var(--gold);}
  tr.r13 .pos{color:var(--red);}
  footer{border-top:3px double var(--magenta); margin-top:40px; padding-top:16px; text-align:center; font-family:Arial,Helvetica,sans-serif; font-size:11px; color:var(--mut); text-transform:uppercase; letter-spacing:.16em;}
  .tabwrap{border-bottom:2px solid var(--magenta); margin-bottom:8px;}
  .tabs{display:flex; gap:6px; justify-content:center; padding:18px 0 0;}
  .tab{font-family:Arial,Helvetica,sans-serif; font-weight:800; font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:var(--mut); text-decoration:none; padding:11px 26px; border:1px solid var(--line); border-bottom:none; border-radius:9px 9px 0 0; background:var(--panel2);}
  .tab:hover:not(.active){color:var(--ink); background:var(--panel);}
  .tab.active{color:var(--bg); background:var(--magenta); border-color:var(--magenta);}
</style>
</head>
<body>
<div class="wrap">

  <nav class="tabwrap"><div class="tabs">
    <a class="tab" href="index.html">Live</a>
    <a class="tab active" href="roundup.html" aria-current="page">Roundup</a>
    <a class="tab" href="morph.html">Gaffers</a>
  </div></nav>

  <header class="mast">
    <div class="kicker">The TRM Fantasy League · World Cup 2026</div>
    <h1 class="title">THE MORNING <span>AFTER</span></h1>
    <div class="subtitle">{{SUBTITLE}}</div>
  </header>

  <div class="setcol">
    {{MARKER}}
    <div class="standby">{{STANDBY}}</div>
    <div class="set">
      {{SET}}
    </div>
  </div>

  <div class="panel">
    <h3>Standings · frozen for the break</h3>
    <table>{{STANDINGS_ROWS}}</table>
  </div>

  <div class="panel">
    <h3>Next up</h3>
    <table>
      <tr><td><span class="mgr" style="font-size:12px;color:var(--ink);margin:0">{{NEXT_FIXTURE}}</span></td></tr>
    </table>
  </div>

  <div style="display:flex;justify-content:flex-end;margin:26px 0 10px;"><a href="archive.html" style="display:inline-block;font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);text-decoration:none;border:1px solid var(--cyan-dim);border-radius:8px;padding:11px 24px;background:var(--panel2);" onmouseover="this.style.background='var(--panel)';this.style.borderColor='var(--cyan)'" onmouseout="this.style.background='var(--panel2)';this.style.borderColor='var(--cyan-dim)'">Archive &rarr;</a></div>
  <footer></footer>
</div>
<script>
(function(){
  try{
    fetch(location.pathname + "?_=" + Date.now(), { cache: "no-store" })
      .then(function(r){ return r.ok ? r.text() : null; })
      .then(function(html){
        if(!html) return;
        var doc = new DOMParser().parseFromString(html, "text/html");
        var fresh = doc.querySelector(".wrap"), cur = document.querySelector(".wrap");
        if(fresh && cur && fresh.innerHTML !== cur.innerHTML){ cur.innerHTML = fresh.innerHTML; }
      }).catch(function(){});
  }catch(e){}
})();
</script>
</body>
</html>
